<!DOCTYPE html>
<html>
    <head lang="en-US">
        <meta charset="utf-8">
        <title>Lobby</title>
    </head>
    <body>
        {% include "home/nav.html" %}
        {% include "Lobby/filters.html" %}
        
        <h1>Lobbies</h1>
        <a href="{% url 'Lobby:lobby_form' %}">
            Host a new Lobby
        </a>
        {% for lobby in lobbies %}
            <div class="lobby-card">
                {% include "Lobby/lobby_info.html" %}
                {% if user.is_authenticated %}
                    {% include "Lobby/lobby_actions.html" %}
                    <br>
                    <a href="{% url 'Lobby:start_lobby_join' lobby.id %}">
                        Join
                    </a>
                {% else %}
                    <a href="{% url 'users:login' %}?next={{ request.path }}">
                        Login and join
                    </a>
                {% endif %}
            </div>
        {% endfor %}
    </body>

    <style>
        .lobby-card {
            border: 2px solid;
            border-color: black;
            margin: 2px;
        }
    </style>
</html>
