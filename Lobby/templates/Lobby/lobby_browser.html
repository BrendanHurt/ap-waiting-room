<!DOCTYPE html>
<html>
    <head lang="en-US">
        <meta charset="utf-8">
        <title>Lobby</title>
    </head>
    <body>
        {% include "home/nav.html" %}
        
        <h1>Lobbies</h1>
        <a href="{% url 'Lobby:lobby_form' %}">
            Host a new Lobby
        </a>
        {% for lobby in lobbies %}
            <div class="lobby-card">
                {% include "Lobby/lobby_info.html" %}
                {% if user is not None %}
                    {% include "Lobby/lobby_actions.html" %}
                {% endif %}
                <br>
                <a href="{% url 'Lobby:start_lobby_join' lobby.id %}">
                    Join
                </a>
            </div>
        {% endfor %}
    </body>

    <style>
        .lobby-card {
            border: 2px solid;
            border-color: black;
            margin: 2px;
        }
    </style>
</html>
