<!DOCTYPE html>
<html>
    <head lang="en-US">
        <meta charset="utf-8">
        <title>Host a lobby</title>
    </head>
    <body>
        {% if lobby_id is not None %}
            <form action="{% url 'Lobby:submit_lobby' lobby_id %}" method="post">
        {% else %}
            <form action="{% url 'Lobby:submit_lobby' %}" method="post">
        {% endif %}
            {% csrf_token %}
            <fieldset>
                <label for="name">Lobby Name</label>
                <input type="text" name="name" id="name" value="{{ lobby_name }}">
            </fieldset>
            <fieldset>
                <label for="start_date">Start Date for the Archipelago Run</label>
                <input type="date" name="start_date" id="start_date" value="{{ lobby_start_date }}" required>
            </fieldset>
            <fieldset>
                <label for="description">Description</label>
                <input type="text" name="description" id="description" value="{{ lobby_description }}">
            </fieldset>
            <input type="checkbox" name="is_async" id="is_async">
            <label for="is_async">Asyncronous Lobby</label>
            <input type="submit" value="Save">
        </form>
        {% for message in messages %}
            <div class="alert alert-{{message.tags}}">{{ message }}</div>
        {% endfor %}
    </body>
</html>
