<!DOCTYPE html>
<html>
    <head lang="en-US">
        <meta charset="utf-8">
        <title>Lobby Details</title>
    </head>
    <body>
        <p>Lobby Name: {{lobby.name}}</p>
        <p>Lobby Start Date: {{lobby.start_date}}</p>
        <label for="lobby-{{lobby.id}}">
            Async Lobby
        </label>
        <input type="checkbox" 
            id="lobby-{{lobby.id}}"
            name="is_async"
            {% if lobby.is_async %}
                checked
            {% endif %}
            diabled
        >
        {% if lobby.description %}
            <p>Description:</p>
            <p>{{lobby.description}}</p>
        {% endif %}
    </body>
</html>
